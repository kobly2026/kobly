<style>
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--surface-app);
    color: var(--text-body);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { height: 100%; }

  /* Motion keyframes — short, ease-out. Entrance motion is state-driven (see motion.jsx);
     these cover the loading shimmer and the toast only. */
  @keyframes kbly-shimmer  { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes kbly-toast-in { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: none; } }
  @keyframes kbly-fade     { from { opacity: 0; } to { opacity: 1; } }
  @keyframes kbly-slide-in { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: none; } }

  .kbly-seg:hover { color: var(--text-body) !important; }

  /* Clickable KPI tiles */
  .kbly-kpi:hover { border-color: var(--border-strong) !important; transform: translateY(-1px); }
  .kbly-kpi:focus-visible { outline: none; box-shadow: var(--shadow-focus); }

  /* AI assistant */
  .kbly-fab:hover { background: var(--accent-hover) !important; transform: translateY(-1px); }
  .kbly-suggchip:hover { border-color: var(--accent) !important; color: var(--text-strong) !important; }
  .kbly-nicho:hover { filter: brightness(1.12); }
  .kbly-typing { animation: kbly-pulse 1.2s ease-in-out infinite; }
  @keyframes kbly-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ApexCharts dark-theme cleanup */
  .apexcharts-tooltip { background: var(--surface-card) !important; border: 1px solid var(--border-default) !important; box-shadow: var(--shadow-lg) !important; color: var(--text-strong) !important; }
  .apexcharts-tooltip-title { background: var(--surface-sunken) !important; border-bottom: 1px solid var(--border-subtle) !important; font-weight: 600 !important; }
  .apexcharts-xaxistooltip, .apexcharts-yaxistooltip { background: var(--surface-card) !important; border-color: var(--border-default) !important; color: var(--text-body) !important; }
  .apexcharts-legend-text { color: var(--text-muted) !important; }

  /* Dark scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--ink-600); border-radius: 999px; border: 2px solid var(--surface-app); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-500); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
