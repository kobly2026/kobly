# Kobly — deploy no Netlify (Vite SPA).
# Importe este repositório no Netlify; estas configurações fazem o build e a publicação.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: qualquer rota cai no index.html (e o link de recuperação de senha
# do Supabase, que volta com #type=recovery, abre em qualquer caminho).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers para produção em domínio próprio (app.koblay.io).
# HSTS + frame-options + referrer-policy protegem a console autenticada.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
